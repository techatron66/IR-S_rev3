<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS • Create Account</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/iris-design-system.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .register-container {
            width: 100%;
            max-width: 380px;
        }
        
        .register-card {
            padding: 48px 40px;
        }
        
        .register-card h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 32px;
            text-align: center;
        }
        
        form { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }
        
        .form-group { 
            margin-bottom: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-label {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.2px;
            text-transform: uppercase;
        }
        
        .input {
            padding: 12px 16px !important;
            font-size: 14px !important;
            border-radius: 10px !important;
        }
        
        .btn-submit { 
            width: 100%;
            padding: 12px 16px !important;
            font-size: 14px !important;
            font-weight: 600 !important;
            border-radius: 10px !important;
            margin-top: 8px;
        }
        
        .register-links {
            margin-top: 28px;
            text-align: center;
            font-size: 13px;
        }
        
        .register-links p {
            margin: 0;
            color: var(--text-secondary);
        }
        
        .register-links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        
        .register-links a:hover { 
            text-decoration: underline; 
        }
        
        .error-message {
            background: var(--red-bg);
            color: var(--red);
            padding: 12px 16px;
            border-radius: var(--r-md);
            font-size: 13px;
            margin-bottom: 20px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="card register-card">
            <h1>Create Account</h1>
            
            {% if error %}
                <div class="error-message">{{ error }}</div>
            {% endif %}

            <form action="/register" method="post">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="input" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="input" placeholder="Create a strong password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-submit">Create Account</button>
            </form>

            <div class="register-links">
                <p>Already have an account? <a href="/login">Sign in</a></p>
            </div>
        </div>
    </div>

    <div class="toast-shelf"></div>
    <script src="{{ url_for('static', path='js/iris-design-system.js') }}"></script>
</body>
</html>
