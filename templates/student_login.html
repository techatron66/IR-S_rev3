<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS • Student Check-In</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/iris-design-system.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        
        .container { 
            width: 100%;
            max-width: 420px;
        }
        
        .card {
            padding: 48px 40px;
        }
        
        h1 { 
            font-size: 26px; 
            font-weight: 700; 
            letter-spacing: -0.5px; 
            margin-bottom: 32px;
            text-align: center;
        }
        
        form { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }
        
        .form-group { 
            margin-bottom: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-label {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.2px;
            text-transform: uppercase;
        }
        
        .input {
            padding: 12px 16px !important;
            font-size: 14px !important;
            border-radius: 10px !important;
        }
        
        .btn-camera { 
            width: 100%;
            padding: 12px 16px !important;
            font-size: 14px !important;
            font-weight: 600 !important;
            border-radius: 10px !important;
            margin-top: 8px;
        }
        
        #cam { display: none; }
        
        .dashboard-link {
            margin-top: 28px;
            text-align: center;
            padding: 16px;
            border-radius: var(--r-md);
            background: var(--accent-light);
            cursor: pointer;
            transition: background var(--fast);
        }
        
        .dashboard-link:hover { background: rgba(0, 113, 227, 0.15); }
        
        .dashboard-link a { 
            color: var(--accent); 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 14px; 
        }
        
        #status {
            margin-top: 20px;
            padding: 12px 16px;
            background: var(--accent-light);
            border-radius: 10px;
            color: var(--accent);
            font-weight: 500;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Attendance Check-In</h1>

            {% if error %}
                <div class="pill pill-red" style="width: 100%; justify-content: center; margin-bottom: 20px;">{{ error }}</div>
            {% endif %}

            <form>
                <input type="hidden" id="cid" value="{{ cid }}">
                
                <div class="form-group">
                    <label class="form-label">Roll Number</label>
                    <input type="text" id="roll" class="input" placeholder="e.g. 24BCS101" required>
                </div>

                <input type="file" id="cam" accept="image/*" capture="user" onchange="upload()">

                <button type="button" class="btn btn-primary btn-lg btn-camera" onclick="document.getElementById('cam').click()">
                    📷 Take Selfie
                </button>
            </form>

            <div id="status" style="display: none;"></div>

            <div class="dashboard-link" onclick="goToDashboard()">
                <a href="#">📊 View My Dashboard</a>
            </div>
        </div>
    </div>

    <div class="toast-shelf"></div>
    <script src="{{ url_for('static', path='js/iris-design-system.js') }}"></script>
    <script>
        function goToDashboard() {
            const roll = document.getElementById('roll').value;
            const cid = document.getElementById('cid').value;
            if (!roll) { showToast('Enter your roll number first', 'warning'); return; }
            if (!cid) { showToast('No class ID set. Scan the QR code first', 'warning'); return; }
            window.location.href = '/dashboard?roll=' + encodeURIComponent(roll) + '&class_id=' + encodeURIComponent(cid);
        }

        async function upload() {
            let statusDiv = document.getElementById("status");
            statusDiv.style.display = "block";
            showToast("Verifying your identity...", "default");

            let fd = new FormData();
            fd.append("file", document.getElementById("cam").files[0]);
            fd.append("class_id", document.getElementById("cid").value);
            fd.append("roll_number", document.getElementById("roll").value);

            try {
                let res = await fetch("/verify", {method: "POST", body: fd});
                let data = await res.json();

                if (data.match) {
                    showToast("✓ Check-in Successful! Redirecting...", "success");
                    const roll = document.getElementById("roll").value;
                    const cid = document.getElementById("cid").value;
                    setTimeout(() => {
                        window.location.href = '/dashboard?roll=' + encodeURIComponent(roll) + '&class_id=' + encodeURIComponent(cid);
                    }, 1500);
                } else {
                    showToast("✕ Verification Failed. Try again.", "error");
                }
            } catch(e) {
                showToast("Server Error. Please try again.", "error");
            }
        }
    </script>
</body>
</html>
</html>
